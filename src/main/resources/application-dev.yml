spring:
  datasource:
    url: ${DB_URL:jdbc:oracle:thin:@dev-db-host:1521/ANSIM}
    username: ${DB_USERNAME:ansimdonghaeng}
    password: ${DB_PASSWORD:change-me}
    driver-class-name: oracle.jdbc.OracleDriver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.OracleDialect
        format_sql: false
        jdbc:
          time_zone: Asia/Seoul

logging:
  level:
    com.ieum.ansimdonghaeng: info
    org.hibernate.SQL: info
    org.hibernate.orm.jdbc.bind: warn

app:
  file-storage:
    base-dir: ${FILE_STORAGE_BASE_DIR:/var/app/ansimdonghaeng/uploads}
