spring:
  config:
    import: optional:file:.env[.properties]
  application:
    name: ansimdonghaeng-backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  jackson:
    time-zone: Asia/Seoul
    serialization:
      write-dates-as-timestamps: false
  jpa:
    open-in-view: false
    properties:
      hibernate:
        default_batch_fetch_size: 50
  servlet:
    multipart:
      max-file-size: ${MULTIPART_MAX_FILE_SIZE:20MB}
      max-request-size: ${MULTIPART_MAX_REQUEST_SIZE:25MB}
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

server:
  port: ${SERVER_PORT:8080}

springdoc:
  api-docs:
    path: /v3/api-docs
  packages-to-scan: com.ieum.ansimdonghaeng

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized

app:
  jwt:
    secret: ${JWT_SECRET:}
    issuer: ${JWT_ISSUER:ansimdonghaeng}
    access-token-expiration-minutes: ${JWT_ACCESS_TOKEN_EXPIRATION_MINUTES:60}
    refresh-token-expiration-minutes: ${JWT_REFRESH_TOKEN_EXPIRATION_MINUTES:10080}
    header: Authorization
    prefix: Bearer
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173,http://localhost:3000,http://127.0.0.1:3000}
  websocket:
    endpoint: ${WEBSOCKET_ENDPOINT:/ws}
  oauth:
    kakao:
      token-uri: ${KAKAO_TOKEN_URI:https://kauth.kakao.com/oauth/token}
      rest-api-key: ${KAKAO_REST_API_KEY:}
      client-secret: ${KAKAO_CLIENT_SECRET:}
      redirect-uri: ${KAKAO_REDIRECT_URI:http://localhost:5173/login/kakao/callback}
      user-info-uri: ${KAKAO_USER_INFO_URI:https://kapi.kakao.com/v2/user/me}
      connect-timeout-millis: ${KAKAO_CONNECT_TIMEOUT_MILLIS:3000}
      response-timeout-millis: ${KAKAO_RESPONSE_TIMEOUT_MILLIS:5000}
  file-storage:
    base-dir: ${FILE_STORAGE_BASE_DIR:./storage/default}
  ai:
    base-url: ${AI_BASE_URL:https://example.invalid}
    connect-timeout-millis: ${AI_CONNECT_TIMEOUT_MILLIS:3000}
    response-timeout-millis: ${AI_RESPONSE_TIMEOUT_MILLIS:5000}
  password-reset:
    token-expiration-minutes: ${PASSWORD_RESET_TOKEN_EXPIRATION_MINUTES:10}
    reset-url-base: ${PASSWORD_RESET_URL_BASE:http://localhost:5173/reset-password}

mail:
  enabled: ${MAIL_ENABLED:false}
